<script>
// ⚠️ IMPORTANT: Yahan apni Google Apps Script URL lagao
const scriptURL = 'YOUR_GOOGLE_APPS_SCRIPT_URL_HERE';

const form = document.getElementById('phdForm');
const modal = document.getElementById('thankYouModal');
const submitBtn = document.getElementById('submitBtn');

// Year toggle functionality
const yearRadios = document.querySelectorAll('input[name="yearType"]');
const dropdownYearDiv = document.getElementById('dropdownYearDiv');
const customYearDiv = document.getElementById('customYearDiv');
const enrollmentYearSelect = document.getElementById('enrollmentYear');
const customYearInput = document.getElementById('customYear');

yearRadios.forEach(radio => {
    radio.addEventListener('change', function() {
        if (this.value === 'dropdown') {
            dropdownYearDiv.classList.remove('hide');
            dropdownYearDiv.classList.add('dropdown-year-input');
            customYearDiv.classList.remove('show');
            enrollmentYearSelect.required = true;
            customYearInput.required = false;
            customYearInput.value = '';
            document.getElementById('enrollmentYearError').textContent = '';
            enrollmentYearSelect.classList.remove('error-border');
        } else {
            dropdownYearDiv.classList.add('hide');
            customYearDiv.classList.add('show');
            enrollmentYearSelect.required = false;
            customYearInput.required = true;
            enrollmentYearSelect.value = '';
            document.getElementById('enrollmentYearError').textContent = '';
            customYearInput.classList.remove('error-border');
        }
    });
});

// Initialize
dropdownYearDiv.classList.remove('hide');
customYearDiv.classList.remove('show');

// Show file name when selected
document.getElementById('feeReceipt').addEventListener('change', function(e) {
    const file = e.target.files[0];
    const fileName = file?.name || '';
    document.getElementById('fileName').textContent = fileName ? `Selected: ${fileName}` : '';
    
    if (file) {
        document.getElementById('feeReceiptError').textContent = '';
        document.getElementById('feeReceipt').classList.remove('error-border');
    }
});

// Clear all error messages and borders
function clearErrors() {
    const fields = ['name', 'email', 'phone', 'department', 'jrfStatus', 'guideName', 'feeReceipt'];
    fields.forEach(field => {
        const element = document.getElementById(field);
        if (element) element.classList.remove('error-border');
        
        const errorSpan = document.getElementById(field + 'Error');
        if (errorSpan) errorSpan.textContent = '';
    });
    
    enrollmentYearSelect.classList.remove('error-border');
    customYearInput.classList.remove('error-border');
    document.getElementById('enrollmentYearError').textContent = '';
    
    const statusDiv = document.getElementById('status');
    statusDiv.style.display = 'none';
    statusDiv.className = '';
    statusDiv.textContent = '';
}

// Get selected year value
function getSelectedYear() {
    const yearType = document.querySelector('input[name="yearType"]:checked').value;
    if (yearType === 'dropdown') {
        return enrollmentYearSelect.value;
    } else {
        return customYearInput.value;
    }
}

// Validate form
function validateForm() {
    clearErrors();
    
    const name = document.getElementById('name');
    const email = document.getElementById('email');
    const phone = document.getElementById('phone');
    const department = document.getElementById('department');
    const jrfStatus = document.getElementById('jrfStatus');
    const guideName = document.getElementById('guideName');
    const feeReceipt = document.getElementById('feeReceipt');
    
    let isValid = true;
    
    if (!name.value.trim()) {
        document.getElementById('nameError').textContent = 'Full name is required';
        name.classList.add('error-border');
        isValid = false;
    }
    
    const emailValue = email.value.trim();
    if (!emailValue) {
        document.getElementById('emailError').textContent = 'Email is required';
        email.classList.add('error-border');
        isValid = false;
    } else if (!emailValue.includes('@') || !emailValue.includes('.')) {
        document.getElementById('emailError').textContent = 'Enter a valid email address';
        email.classList.add('error-border');
        isValid = false;
    }
    
    const phoneValue = phone.value.trim();
    if (!phoneValue) {
        document.getElementById('phoneError').textContent = 'Phone number is required';
        phone.classList.add('error-border');
        isValid = false;
    } else if (!/^\d{10}$/.test(phoneValue)) {
        document.getElementById('phoneError').textContent = 'Enter a valid 10-digit phone number';
        phone.classList.add('error-border');
        isValid = false;
    }
    
    if (!department.value) {
        document.getElementById('departmentError').textContent = 'Please select a department';
        department.classList.add('error-border');
        isValid = false;
    }
    
    const yearType = document.querySelector('input[name="yearType"]:checked').value;
    if (yearType === 'dropdown') {
        if (!enrollmentYearSelect.value) {
            document.getElementById('enrollmentYearError').textContent = 'Please select enrollment year';
            enrollmentYearSelect.classList.add('error-border');
            isValid = false;
        }
    } else {
        const yearValue = customYearInput.value;
        if (!yearValue) {
            document.getElementById('enrollmentYearError').textContent = 'Please enter enrollment year';
            customYearInput.classList.add('error-border');
            isValid = false;
        } else if (yearValue < 1950 || yearValue > 2030) {
            document.getElementById('enrollmentYearError').textContent = 'Please enter a valid year (1950-2030)';
            customYearInput.classList.add('error-border');
            isValid = false;
        }
    }
    
    if (!jrfStatus.value) {
        document.getElementById('jrfStatusError').textContent = 'Please select JRF/Non-JRF status';
        jrfStatus.classList.add('error-border');
        isValid = false;
    }
    
    if (!guideName.value.trim()) {
        document.getElementById('guideNameError').textContent = 'Guide/Supervisor name is required';
        guideName.classList.add('error-border');
        isValid = false;
    }
    
    if (!feeReceipt.files.length) {
        document.getElementById('feeReceiptError').textContent = 'Please upload fee receipt';
        feeReceipt.classList.add('error-border');
        isValid = false;
    } else {
        const file = feeReceipt.files[0];
        const validTypes = ['application/pdf', 'image/jpeg', 'image/jpg', 'image/png'];
        if (!validTypes.includes(file.type)) {
            document.getElementById('feeReceiptError').textContent = 'Only PDF, JPG, JPEG, PNG files allowed';
            feeReceipt.classList.add('error-border');
            isValid = false;
        }
        if (file.size > 2 * 1024 * 1024) {
            document.getElementById('feeReceiptError').textContent = 'File size should be less than 2MB';
            feeReceipt.classList.add('error-border');
            isValid = false;
        }
    }
    
    return isValid;
}

// Convert file to Base64
function fileToBase64(file) {
    return new Promise((resolve, reject) => {
        const reader = new FileReader();
        reader.onload = () => resolve(reader.result.split(',')[1]);
        reader.onerror = reject;
        reader.readAsDataURL(file);
    });
}

// Show loading state
function setLoading(isLoading) {
    if (isLoading) {
        submitBtn.disabled = true;
        submitBtn.textContent = 'Submitting...';
        const statusDiv = document.getElementById('status');
        statusDiv.textContent = 'Please wait, submitting your application...';
        statusDiv.className = 'loading';
        statusDiv.style.display = 'block';
    } else {
        submitBtn.disabled = false;
        submitBtn.textContent = 'Submit Application';
    }
}

function showPopup() {
    modal.style.display = 'block';
}

function closeModal() {
    modal.style.display = 'none';
}

window.onclick = function(event) {
    if (event.target === modal) {
        modal.style.display = 'none';
    }
}

// ✅ FIXED FORM SUBMIT HANDLER - mode: 'no-cors' ke saath
form.addEventListener('submit', async (e) => {
    e.preventDefault();
    
    if (!validateForm()) {
        return;
    }
    
    setLoading(true);
    
    try {
        const file = document.getElementById('feeReceipt').files[0];
        const fileBase64 = await fileToBase64(file);
        
        const yearType = document.querySelector('input[name="yearType"]:checked').value;
        let enrollmentYear = '';
        if (yearType === 'dropdown') {
            enrollmentYear = document.getElementById('enrollmentYear').value;
        } else {
            enrollmentYear = document.getElementById('customYear').value;
        }
        
        const formObject = {
            name: document.getElementById('name').value.trim(),
            email: document.getElementById('email').value.trim(),
            phone: document.getElementById('phone').value.trim(),
            department: document.getElementById('department').value,
            enrollmentYear: enrollmentYear,
            jrfStatus: document.getElementById('jrfStatus').value,
            guideName: document.getElementById('guideName').value.trim(),
            fileName: file.name,
            fileType: file.type,
            fileBase64: fileBase64
        };
        
        console.log("Sending data:", formObject);
        
        // ✅ FIX: 'no-cors' mode use kiya
        const response = await fetch(scriptURL, {
            method: 'POST',
            mode: 'no-cors',
            headers: {
                'Content-Type': 'application/json',
            },
            body: JSON.stringify(formObject)
        });
        
        // 'no-cors' mode mein response.json() nahi chalega
        // Isliye assume karte hain ki success hai
        form.reset();
        document.getElementById('fileName').textContent = '';
        document.querySelector('input[name="yearType"][value="dropdown"]').checked = true;
        dropdownYearDiv.classList.remove('hide');
        customYearDiv.classList.remove('show');
        enrollmentYearSelect.value = '';
        customYearInput.value = '';
        setLoading(false);
        showPopup();
        
        const statusDiv = document.getElementById('status');
        statusDiv.textContent = '✓ Application submitted successfully!';
        statusDiv.className = 'success';
        statusDiv.style.display = 'block';
        
        setTimeout(() => {
            statusDiv.style.display = 'none';
        }, 3000);
        
    } catch (error) {
        console.error('Error:', error);
        setLoading(false);
        
        const statusDiv = document.getElementById('status');
        statusDiv.textContent = '❌ Error: ' + error.message;
        statusDiv.className = 'error';
        statusDiv.style.display = 'block';
        
        setTimeout(() => {
            statusDiv.style.display = 'none';
        }, 3000);
    }
});

// Real-time validation
const validationFields = ['name', 'email', 'phone', 'department', 'jrfStatus', 'guideName'];
validationFields.forEach(field => {
    const element = document.getElementById(field);
    if (element) {
        element.addEventListener('input', function() {
            this.classList.remove('error-border');
            const errorSpan = document.getElementById(field + 'Error');
            if (errorSpan) errorSpan.textContent = '';
        });
    }
});

// Phone number validation
document.getElementById('phone').addEventListener('input', function(e) {
    this.value = this.value.replace(/[^0-9]/g, '').slice(0, 10);
});

customYearInput.addEventListener('input', function() {
    this.classList.remove('error-border');
    document.getElementById('enrollmentYearError').textContent = '';
});

enrollmentYearSelect.addEventListener('change', function() {
    this.classList.remove('error-border');
    document.getElementById('enrollmentYearError').textContent = '';
});
</script>
