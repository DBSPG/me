<!DOCTYPE html>
<html>
<head>
    <title>Working Form with Google Sheets</title>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <style>
        body {
            font-family: Arial, sans-serif;
            max-width: 500px;
            margin: 50px auto;
            padding: 20px;
            background: #f0f2f5;
        }
        .container {
            background: white;
            padding: 30px;
            border-radius: 15px;
            box-shadow: 0 5px 20px rgba(0,0,0,0.1);
        }
        h2 {
            text-align: center;
            color: #1a73e8;
            margin-bottom: 30px;
        }

        /* ✅ UPDATED */
        input, textarea, select {
            width: 100%;
            padding: 12px;
            margin: 8px 0 20px 0;
            border: 2px solid #e0e0e0;
            border-radius: 8px;
            box-sizing: border-box;
            font-size: 14px;
            transition: all 0.3s;
        }

        input:focus, textarea:focus, select:focus {
            border-color: #1a73e8;
            outline: none;
            box-shadow: 0 0 0 3px rgba(26,115,232,0.1);
        }

        label {
            font-weight: 600;
            color: #333;
        }

        button {
            background: #1a73e8;
            color: white;
            padding: 14px;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            width: 100%;
        }

        #status {
            margin-top: 20px;
            padding: 12px;
            border-radius: 8px;
            display: none;
            text-align: center;
        }

        .success {
            background: #d4edda;
            color: #155724;
            display: block;
        }

        .error {
            background: #f8d7da;
            color: #721c24;
            display: block;
        }

        .modal {
            display: none;
            position: fixed;
            z-index: 9999;
            left: 0;
            top: 0;
            width: 100%;
            height: 100%;
            background-color: rgba(0,0,0,0.5);
        }

        .modal-content {
            background-color: white;
            margin: 20% auto;
            padding: 30px;
            border-radius: 20px;
            width: 90%;
            max-width: 400px;
            text-align: center;
        }
    </style>
</head>

<body>
<div class="container">
    <h2>📝 Contact Form</h2>

    <form id="contactForm">

        <label>Full Name *</label>
        <input type="text" name="name" id="name" required>

        <label>Email *</label>
        <input type="email" name="email" id="email" required>

        <label>Phone</label>
        <input type="tel" name="phone" id="phone">

        <!-- ✅ ADDED -->
        <label>Department *</label>
        <select name="department" id="department" required>
            <option value="">-- Select Department --</option>
            <option>Botany</option>
            <option>Chemistry</option>
            <option>Commerce</option>
            <option>Computer Applications</option>
            <option>Economics</option>
            <option>Education</option>
            <option>Electronics</option>
            <option>English</option>
            <option>Geography</option>
            <option>Hindi</option>
            <option>History</option>
            <option>Library Science</option>
            <option>Mathematics</option>
            <option>Microbiology</option>
            <option>Physical Education</option>
            <option>Physics</option>
            <option>Political Science</option>
            <option>Sanskrit</option>
            <option>Sociology</option>
            <option>Teacher Education (B.Ed.)</option>
            <option>Zoology</option>
        </select>

        <label>Message *</label>
        <textarea name="message" id="message" required></textarea>

        <button type="submit" id="submitBtn">Submit</button>
    </form>

    <div id="status"></div>
</div>

<!-- Popup -->
<div id="thankYouModal" class="modal">
    <div class="modal-content">
        <h2>Thank You!</h2>
        <p>Form submitted successfully</p>
        <button onclick="closeModal()">Close</button>
    </div>
</div>

<script>
const scriptURL = 'https://script.google.com/macros/s/AKfycbxJlI5HweYJbt5DP0jaIxw91GQ4tjc5f8jqncAhdwAIOgC37I3csHCp7iEw0Wl46xcb/exec';

const form = document.getElementById('contactForm');
const modal = document.getElementById('thankYouModal');

form.addEventListener('submit', async (e) => {
    e.preventDefault();

    if (!validateForm()) return;

    const formData = new FormData(form);
    const data = new URLSearchParams(formData);

    try {
        const res = await fetch(scriptURL, {
            method: 'POST',
            body: data
        });

        if (res.ok) {
            form.reset();
            showPopup();
        }
    } catch (err) {
        alert('Error');
    }
});

function validateForm() {
    const name = document.getElementById('name');
    const email = document.getElementById('email');
    const message = document.getElementById('message');
    const department = document.getElementById('department');

    let valid = true;

    [name, email, message, department].forEach(f => f.style.borderColor = '#e0e0e0');

    if (!name.value) valid = false;
    if (!email.value.includes('@')) valid = false;
    if (!message.value) valid = false;

    // ✅ department validation
    if (!department.value) valid = false;

    if (!valid) {
        document.getElementById('status').innerText = 'Fill all required fields';
        document.getElementById('status').className = 'error';
    }

    return valid;
}

function showPopup() {
    modal.style.display = 'block';
}

function closeModal() {
    modal.style.display = 'none';
}
</script>
</body>
</html>
