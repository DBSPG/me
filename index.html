<!DOCTYPE html>
<html>
<head>
    <title>Working Form with Google Sheets</title>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <style>
        body {
            font-family: Arial, sans-serif;
            max-width: 500px;
            margin: 50px auto;
            padding: 20px;
            background: #f0f2f5;
        }
        .container {
            background: white;
            padding: 30px;
            border-radius: 15px;
            box-shadow: 0 5px 20px rgba(0,0,0,0.1);
        }
        h2 {
            text-align: center;
            color: #1a73e8;
            margin-bottom: 30px;
        }

        input, textarea, select {
            width: 100%;
            padding: 12px;
            margin: 8px 0 20px 0;
            border: 2px solid #e0e0e0;
            border-radius: 8px;
            box-sizing: border-box;
            font-size: 14px;
            transition: all 0.3s;
        }

        input:focus, textarea:focus, select:focus {
            border-color: #1a73e8;
            outline: none;
            box-shadow: 0 0 0 3px rgba(26,115,232,0.1);
        }

        label {
            font-weight: 600;
            color: #333;
        }

        button {
            background: #1a73e8;
            color: white;
            padding: 14px;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            width: 100%;
            font-size: 16px;
            font-weight: bold;
            transition: background 0.3s;
        }

        button:hover {
            background: #1557b0;
        }

        button:disabled {
            background: #ccc;
            cursor: not-allowed;
        }

        #status {
            margin-top: 20px;
            padding: 12px;
            border-radius: 8px;
            display: none;
            text-align: center;
        }

        .success {
            background: #d4edda;
            color: #155724;
            display: block;
        }

        .error {
            background: #f8d7da;
            color: #721c24;
            display: block;
        }

        .loading {
            background: #fff3cd;
            color: #856404;
            display: block;
        }

        .modal {
            display: none;
            position: fixed;
            z-index: 9999;
            left: 0;
            top: 0;
            width: 100%;
            height: 100%;
            background-color: rgba(0,0,0,0.5);
        }

        .modal-content {
            background-color: white;
            margin: 20% auto;
            padding: 30px;
            border-radius: 20px;
            width: 90%;
            max-width: 400px;
            text-align: center;
        }

        .modal-content button {
            width: auto;
            padding: 10px 30px;
            margin-top: 10px;
        }

        .error-border {
            border-color: #dc3545 !important;
        }

        .field-error {
            color: #dc3545;
            font-size: 12px;
            margin-top: -15px;
            margin-bottom: 10px;
            display: block;
        }
    </style>
</head>

<body>
<div class="container">
    <h2>📝 Contact Form</h2>

    <form id="contactForm">
        <label>Full Name *</label>
        <input type="text" name="name" id="name">
        <span class="field-error" id="nameError"></span>

        <label>Email *</label>
        <input type="email" name="email" id="email">
        <span class="field-error" id="emailError"></span>

        <label>Phone</label>
        <input type="tel" name="phone" id="phone">
        <span class="field-error" id="phoneError"></span>

        <label>Department *</label>
        <select name="department" id="department">
            <option value="">-- Select Department --</option>
            <option value="Botany">Botany</option>
            <option value="Chemistry">Chemistry</option>
            <option value="Commerce">Commerce</option>
            <option value="Computer Applications">Computer Applications</option>
            <option value="Economics">Economics</option>
            <option value="Education">Education</option>
            <option value="Electronics">Electronics</option>
            <option value="English">English</option>
            <option value="Geography">Geography</option>
            <option value="Hindi">Hindi</option>
            <option value="History">History</option>
            <option value="Library Science">Library Science</option>
            <option value="Mathematics">Mathematics</option>
            <option value="Microbiology">Microbiology</option>
            <option value="Physical Education">Physical Education</option>
            <option value="Physics">Physics</option>
            <option value="Political Science">Political Science</option>
            <option value="Sanskrit">Sanskrit</option>
            <option value="Sociology">Sociology</option>
            <option value="Teacher Education (B.Ed.)">Teacher Education (B.Ed.)</option>
            <option value="Zoology">Zoology</option>
        </select>
        <span class="field-error" id="departmentError"></span>

        <label>Message *</label>
        <textarea name="message" id="message" rows="4"></textarea>
        <span class="field-error" id="messageError"></span>

        <button type="submit" id="submitBtn">Submit</button>
    </form>

    <div id="status"></div>
</div>

<!-- Popup -->
<div id="thankYouModal" class="modal">
    <div class="modal-content">
        <h2>🙏 Thank You!</h2>
        <p>Your form has been submitted successfully.</p>
        <button onclick="closeModal()">Close</button>
    </div>
</div>

<script>
const scriptURL = 'https://script.google.com/macros/s/AKfycbxJlI5HweYJbt5DP0jaIxw91GQ4tjc5f8jqncAhdwAIOgC37I3csHCp7iEw0Wl46xcb/exec';

const form = document.getElementById('contactForm');
const modal = document.getElementById('thankYouModal');
const submitBtn = document.getElementById('submitBtn');

// Clear all error messages and borders
function clearErrors() {
    const fields = ['name', 'email', 'department', 'message'];
    fields.forEach(field => {
        const element = document.getElementById(field);
        if (element) element.classList.remove('error-border');
        
        const errorSpan = document.getElementById(field + 'Error');
        if (errorSpan) errorSpan.textContent = '';
    });
    
    const statusDiv = document.getElementById('status');
    statusDiv.style.display = 'none';
    statusDiv.className = '';
    statusDiv.textContent = '';
}

// Validate form with specific error messages
function validateForm() {
    clearErrors();
    
    const name = document.getElementById('name');
    const email = document.getElementById('email');
    const department = document.getElementById('department');
    const message = document.getElementById('message');
    
    let isValid = true;
    
    // Name validation
    if (!name.value.trim()) {
        document.getElementById('nameError').textContent = 'Full name is required';
        name.classList.add('error-border');
        isValid = false;
    }
    
    // Email validation
    const emailValue = email.value.trim();
    if (!emailValue) {
        document.getElementById('emailError').textContent = 'Email is required';
        email.classList.add('error-border');
        isValid = false;
    } else if (!emailValue.includes('@') || !emailValue.includes('.')) {
        document.getElementById('emailError').textContent = 'Please enter a valid email address';
        email.classList.add('error-border');
        isValid = false;
    }
    
    // Department validation
    if (!department.value) {
        document.getElementById('departmentError').textContent = 'Please select a department';
        department.classList.add('error-border');
        isValid = false;
    }
    
    // Message validation
    if (!message.value.trim()) {
        document.getElementById('messageError').textContent = 'Message is required';
        message.classList.add('error-border');
        isValid = false;
    } else if (message.value.trim().length < 10) {
        document.getElementById('messageError').textContent = 'Message must be at least 10 characters';
        message.classList.add('error-border');
        isValid = false;
    }
    
    return isValid;
}

// Show loading state
function setLoading(isLoading) {
    if (isLoading) {
        submitBtn.disabled = true;
        submitBtn.textContent = 'Submitting...';
        const statusDiv = document.getElementById('status');
        statusDiv.textContent = 'Please wait, submitting your form...';
        statusDiv.className = 'loading';
        statusDiv.style.display = 'block';
    } else {
        submitBtn.disabled = false;
        submitBtn.textContent = 'Submit';
    }
}

// Show popup
function showPopup() {
    modal.style.display = 'block';
}

// Close popup
function closeModal() {
    modal.style.display = 'none';
}

// Close modal when clicking outside
window.onclick = function(event) {
    if (event.target === modal) {
        modal.style.display = 'none';
    }
}

// Form submit handler
form.addEventListener('submit', async (e) => {
    e.preventDefault();
    
    // Validate form
    if (!validateForm()) {
        return;
    }
    
    // Show loading state
    setLoading(true);
    
    // Create FormData
    const formData = new FormData(form);
    const data = new URLSearchParams(formData);
    
    try {
        const res = await fetch(scriptURL, {
            method: 'POST',
            mode: 'no-cors', // Add this for Google Apps Script
            body: data
        });
        
        // Since we're using no-cors, we can't check res.ok properly
        // So we assume success if no error is thrown
        form.reset();
        setLoading(false);
        showPopup();
        
        // Show success message
        const statusDiv = document.getElementById('status');
        statusDiv.textContent = 'Form submitted successfully!';
        statusDiv.className = 'success';
        statusDiv.style.display = 'block';
        
        // Clear success message after 3 seconds
        setTimeout(() => {
            statusDiv.style.display = 'none';
        }, 3000);
        
    } catch (err) {
        console.error('Error:', err);
        setLoading(false);
        
        const statusDiv = document.getElementById('status');
        statusDiv.textContent = 'Error submitting form. Please try again.';
        statusDiv.className = 'error';
        statusDiv.style.display = 'block';
        
        // Clear error message after 3 seconds
        setTimeout(() => {
            statusDiv.style.display = 'none';
        }, 3000);
    }
});

// Real-time validation (optional - removes error when user starts typing)
const fields = ['name', 'email', 'department', 'message'];
fields.forEach(field => {
    const element = document.getElementById(field);
    if (element) {
        element.addEventListener('input', function() {
            this.classList.remove('error-border');
            const errorSpan = document.getElementById(field + 'Error');
            if (errorSpan) errorSpan.textContent = '';
        });
    }
});

// Special handling for email real-time validation
document.getElementById('email').addEventListener('input', function() {
    this.classList.remove('error-border');
    document.getElementById('emailError').textContent = '';
});

// Phone number validation (optional - only numbers)
document.getElementById('phone').addEventListener('input', function(e) {
    this.value = this.value.replace(/[^0-9]/g, '');
});
</script>
</body>
</html>
