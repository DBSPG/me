<!DOCTYPE html>
<html>
<head>
    <title>PhD Registration Form</title>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: Arial, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }
        .container {
            max-width: 600px;
            margin: 0 auto;
            background: white;
            border-radius: 20px;
            padding: 30px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
        }
        h2 {
            text-align: center;
            color: #333;
            margin-bottom: 30px;
        }
        .form-group {
            margin-bottom: 20px;
        }
        label {
            display: block;
            margin-bottom: 5px;
            font-weight: bold;
            color: #555;
        }
        input, select {
            width: 100%;
            padding: 10px;
            border: 2px solid #ddd;
            border-radius: 8px;
            font-size: 14px;
        }
        input:focus, select:focus {
            outline: none;
            border-color: #667eea;
        }
        button {
            width: 100%;
            padding: 12px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
        }
        button:disabled {
            opacity: 0.6;
            cursor: not-allowed;
        }
        .error {
            color: red;
            font-size: 12px;
            margin-top: 5px;
        }
        .success-msg {
            background: #d4edda;
            color: #155724;
            padding: 10px;
            border-radius: 8px;
            margin-top: 20px;
            text-align: center;
        }
        .error-msg {
            background: #f8d7da;
            color: #721c24;
            padding: 10px;
            border-radius: 8px;
            margin-top: 20px;
            text-align: center;
        }
        .required {
            color: red;
        }
        .year-option {
            margin: 10px 0;
        }
        .year-option label {
            display: inline;
            margin-right: 20px;
            font-weight: normal;
        }
        .year-option input {
            width: auto;
            margin-right: 5px;
        }
        .hidden {
            display: none;
        }
        .file-info {
            font-size: 12px;
            color: #666;
            margin-top: 5px;
        }
    </style>
</head>
<body>
<div class="container">
    <h2>🎓 PhD Registration Form</h2>
    
    <form id="registrationForm">
        <div class="form-group">
            <label>Full Name <span class="required">*</span></label>
            <input type="text" id="name" required>
        </div>
        
        <div class="form-group">
            <label>Email <span class="required">*</span></label>
            <input type="email" id="email" required>
        </div>
        
        <div class="form-group">
            <label>Phone <span class="required">*</span></label>
            <input type="tel" id="phone" required>
        </div>
        
        <div class="form-group">
            <label>Department <span class="required">*</span></label>
            <select id="department" required>
                <option value="">Select Department</option>
                <option>Botany</option>
                <option>Chemistry</option>
                <option>Commerce</option>
                <option>Computer Applications</option>
                <option>Economics</option>
                <option>Education</option>
                <option>Electronics</option>
                <option>English</option>
                <option>Geography</option>
                <option>Hindi</option>
                <option>History</option>
                <option>Library Science</option>
                <option>Mathematics</option>
                <option>Microbiology</option>
                <option>Physical Education</option>
                <option>Physics</option>
                <option>Political Science</option>
                <option>Sanskrit</option>
                <option>Sociology</option>
                <option>Zoology</option>
            </select>
        </div>
        
        <div class="form-group">
            <label>Enrollment Year <span class="required">*</span></label>
            <div class="year-option">
                <label>
                    <input type="radio" name="yearType" value="dropdown" checked> Select from list
                </label>
                <label>
                    <input type="radio" name="yearType" value="custom"> Enter manually
                </label>
            </div>
            <select id="yearDropdown">
                <option value="">Select Year</option>
                <option>2020</option><option>2021</option><option>2022</option>
                <option>2023</option><option>2024</option><option>2025</option>
            </select>
            <input type="number" id="yearCustom" placeholder="Enter year" class="hidden">
        </div>
        
        <div class="form-group">
            <label>JRF Status <span class="required">*</span></label>
            <select id="jrfStatus" required>
                <option value="">Select Status</option>
                <option>JRF</option>
                <option>Non-JRF</option>
            </select>
        </div>
        
        <div class="form-group">
            <label>Guide Name <span class="required">*</span></label>
            <input type="text" id="guideName" required>
        </div>
        
        <div class="form-group">
            <label>Fee Receipt <span class="required">*</span></label>
            <input type="file" id="fileUpload" accept=".pdf,.jpg,.png">
            <div class="file-info">Max 2MB (PDF, JPG, PNG)</div>
        </div>
        
        <button type="submit" id="submitBtn">Submit Application</button>
    </form>
    
    <div id="message"></div>
</div>

<script>
// 🔴 APNA NAYA URL YAHAN LAGAO 🔴
const SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbyKHvrUbmppYdrAUy-QyeTf4r1KwQ0-n_IeGSUe6NiAZGmLYXg2-psDZ11zPVcy0PtS/exec';

// Year toggle
const yearDropdown = document.getElementById('yearDropdown');
const yearCustom = document.getElementById('yearCustom');
const radioDropdown = document.querySelector('input[value="dropdown"]');
const radioCustom = document.querySelector('input[value="custom"]');

radioDropdown.addEventListener('change', () => {
    yearDropdown.classList.remove('hidden');
    yearCustom.classList.add('hidden');
    yearCustom.value = '';
});

radioCustom.addEventListener('change', () => {
    yearDropdown.classList.add('hidden');
    yearCustom.classList.remove('hidden');
    yearDropdown.value = '';
});

// File to Base64
function fileToBase64(file) {
    return new Promise((resolve, reject) => {
        const reader = new FileReader();
        reader.onload = () => resolve(reader.result.split(',')[1]);
        reader.onerror = reject;
        reader.readAsDataURL(file);
    });
}

// Show message
function showMessage(text, isError = false) {
    const msgDiv = document.getElementById('message');
    msgDiv.innerHTML = `<div class="${isError ? 'error-msg' : 'success-msg'}">${text}</div>`;
    setTimeout(() => {
        msgDiv.innerHTML = '';
    }, 5000);
}

// Submit form
document.getElementById('registrationForm').addEventListener('submit', async (e) => {
    e.preventDefault();
    
    const submitBtn = document.getElementById('submitBtn');
    submitBtn.disabled = true;
    submitBtn.textContent = 'Submitting...';
    
    try {
        // Get values
        const name = document.getElementById('name').value.trim();
        const email = document.getElementById('email').value.trim();
        const phone = document.getElementById('phone').value.trim();
        const department = document.getElementById('department').value;
        const jrfStatus = document.getElementById('jrfStatus').value;
        const guideName = document.getElementById('guideName').value.trim();
        const file = document.getElementById('fileUpload').files[0];
        
        // Validate
        if (!name || !email || !phone || !department || !jrfStatus || !guideName) {
            throw new Error('Please fill all required fields');
        }
        
        if (!/^\d{10}$/.test(phone)) {
            throw new Error('Enter valid 10-digit phone number');
        }
        
        if (!email.includes('@')) {
            throw new Error('Enter valid email address');
        }
        
        if (!file) {
            throw new Error('Please upload fee receipt');
        }
        
        if (file.size > 2 * 1024 * 1024) {
            throw new Error('File size must be less than 2MB');
        }
        
        // Get year
        let enrollmentYear;
        if (radioDropdown.checked) {
            enrollmentYear = yearDropdown.value;
            if (!enrollmentYear) throw new Error('Please select enrollment year');
        } else {
            enrollmentYear = yearCustom.value;
            if (!enrollmentYear) throw new Error('Please enter enrollment year');
        }
        
        // Convert file to base64
        const fileBase64 = await fileToBase64(file);
        
        // Prepare data
        const formData = {
            name: name,
            email: email,
            phone: phone,
            department: department,
            enrollmentYear: enrollmentYear,
            jrfStatus: jrfStatus,
            guideName: guideName,
            fileName: file.name,
            fileType: file.type,
            fileBase64: fileBase64
        };
        
        console.log('Sending to:', SCRIPT_URL);
        
        // Send to Google Script
        const response = await fetch(SCRIPT_URL, {
            method: 'POST',
            mode: 'cors',
            headers: {
                'Content-Type': 'application/json',
            },
            body: JSON.stringify(formData)
        });
        
        const result = await response.json();
        
        if (result.success) {
            showMessage('✅ Registration successful!');
            document.getElementById('registrationForm').reset();
            yearDropdown.classList.remove('hidden');
            yearCustom.classList.add('hidden');
            radioDropdown.checked = true;
        } else {
            throw new Error(result.error || 'Submission failed');
        }
        
    } catch (error) {
        console.error('Error:', error);
        showMessage('❌ ' + error.message, true);
    } finally {
        submitBtn.disabled = false;
        submitBtn.textContent = 'Submit Application';
    }
});
</script>
</body>
</html>
